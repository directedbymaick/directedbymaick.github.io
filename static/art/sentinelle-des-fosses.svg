<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#03121f"/>
      <stop offset="0.55" stop-color="#0c3552"/>
      <stop offset="1" stop-color="#2a9dd4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0" stop-color="#9fe4ff" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#2a9dd4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2a9dd4" stop-opacity="0"/>
    </radialGradient>
    <filter id="wave"><feTurbulence type="turbulence" baseFrequency="0.012 0.04" numOctaves="2" seed="7"/><feDisplacementMap in="SourceGraphic" scale="30"/></filter>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="9"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.14"/></feComponentTransfer></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="240" rx="300" ry="220" fill="url(#glow)"/>
  <g filter="url(#wave)">
    <path d="M400 90 L470 260 L430 260 L500 470 L300 470 L370 260 L330 260 Z" fill="#06283d" stroke="#9fe4ff" stroke-width="6"/>
    <circle cx="400" cy="180" r="34" fill="#9fe4ff"/>
  </g>
  <g stroke="#7fd1f0" stroke-width="3" opacity="0.55" fill="none">
    <path d="M60 520 Q 200 480 400 520 T 740 520"/>
    <path d="M60 560 Q 240 530 400 560 T 740 560"/>
  </g>
  <rect width="800" height="600" filter="url(#rough)" opacity="0.5"/>
</svg>
