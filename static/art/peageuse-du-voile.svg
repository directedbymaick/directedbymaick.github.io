<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#120b21"/>
      <stop offset="0.6" stop-color="#31205e"/>
      <stop offset="1" stop-color="#8a5dd4"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.35" r="0.35">
      <stop offset="0" stop-color="#f0e6ff"/>
      <stop offset="0.4" stop-color="#c4a7ff" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#c4a7ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="drift"><feTurbulence type="turbulence" baseFrequency="0.008 0.03" numOctaves="2" seed="77"/><feDisplacementMap in="SourceGraphic" scale="46"/></filter>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="31"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="400" cy="210" r="230" fill="url(#moon)"/>
  <g filter="url(#drift)">
    <path d="M400 110 C 330 210 340 260 320 360 C 310 440 350 520 400 560 C 450 520 490 440 480 360 C 460 260 470 210 400 110 Z"
      fill="#1c1233" stroke="#c4a7ff" stroke-width="5" opacity="0.92"/>
    <ellipse cx="400" cy="250" rx="46" ry="60" fill="#f0e6ff" opacity="0.85"/>
  </g>
  <g stroke="#c4a7ff" stroke-width="2.5" opacity="0.6" fill="none">
    <path d="M120 480 Q 250 430 400 470 T 690 460"/>
    <path d="M90 540 Q 260 500 430 540 T 720 520"/>
  </g>
  <g fill="#f0e6ff" opacity="0.9">
    <circle cx="180" cy="140" r="3"/><circle cx="640" cy="110" r="4"/><circle cx="560" cy="330" r="3"/>
    <circle cx="240" cy="300" r="2.5"/><circle cx="680" cy="240" r="2.5"/>
  </g>
  <rect width="800" height="600" filter="url(#rough)" opacity="0.5"/>
</svg>
