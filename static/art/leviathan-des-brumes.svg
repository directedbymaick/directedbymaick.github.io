    <path d="M660 250 L 730 190 L 720 270 Z" fill="#041e2e" stroke="#7fd1f0" stroke-width="5"/>
  </g>
  <g stroke="#7fd1f0" stroke-width="2.5" opacity="0.5" fill="none">
