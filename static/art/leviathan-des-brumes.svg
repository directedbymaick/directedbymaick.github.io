<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#020c14"/>
      <stop offset="0.5" stop-color="#083048"/>
      <stop offset="1" stop-color="#125a80"/>
    </linearGradient>
    <radialGradient id="abyss" cx="0.5" cy="0.55" r="0.55">
      <stop offset="0" stop-color="#7fd1f0" stop-opacity="0.7"/>
      <stop offset="0.55" stop-color="#2a9dd4" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#2a9dd4" stop-opacity="0"/>
    </radialGradient>
    <filter id="drift"><feTurbulence type="turbulence" baseFrequency="0.01 0.025" numOctaves="2" seed="99"/><feDisplacementMap in="SourceGraphic" scale="38"/></filter>
